<svg xmlns="http://www.w3.org/2000/svg" viewBox="2071 433 1400 1400">
  <defs>
    <clipPath id="reveal">
      <rect x="2071" y="433" width="1400" height="0">
        <animate attributeName="height"
                 from="0" to="1400"
                 begin="4.5s" dur="1.5s"
                 repeatCount="1" fill="freeze"
                 calcMode="spline" keyTimes="0;1"
                 keySplines="0.16 1 0.3 1"/>
      </rect>
    </clipPath>
    <style>
      #orbit-circle {
        stroke-dasharray: 3960;
        stroke-dashoffset: 3960;
        transform-box: fill-box;
        transform-origin: center;
        animation:
          drawCircle 2s cubic-bezier(0.25, 0.1, 0.1, 1) 0s    1 forwards,
          spinCircle 2.5s ease-in-out                    2s    1 forwards,
          fadeCircle 1s ease-in                          4s    1 forwards;
      }
      @keyframes drawCircle {
        to { stroke-dashoffset: 0; }
      }
      @keyframes spinCircle {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeCircle {
        to { opacity: 0; }
      }
      #symbol {
        animation: settleGlow 0.8s ease-out 6s 1 forwards;
      }
      @keyframes settleGlow {
        from { filter: brightness(1.6); }
        to   { filter: brightness(1.0); }
      }
    </style>
  </defs>

  <circle id="orbit-circle" cx="2771" cy="1133" r="630"
          fill="none" stroke="#14110e" stroke-width="50"/>

