<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stroke {
        fill: none;
        stroke: #c29b6d;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .draw-main {
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        animation: drawMain 1.55s cubic-bezier(0.55, 0.05, 0.25, 1) forwards;
      }

      .draw-inner {
        stroke-dasharray: 700;
        stroke-dashoffset: 700;
        animation: drawInner 0.6s cubic-bezier(0.55, 0.05, 0.25, 1) forwards;
        animation-delay: 1.45s;
      }

      .draw-accent {
        stroke-dasharray: 240;
        stroke-dashoffset: 240;
        animation: drawAccent 0.35s cubic-bezier(0.55, 0.05, 0.25, 1) forwards;
        animation-delay: 2.05s;
      }

      @keyframes drawMain {
        0% { stroke-dashoffset: 1200; }
        70% { stroke-dashoffset: 280; }
        100% { stroke-dashoffset: 0; }
      }

      @keyframes drawInner {
        0% { stroke-dashoffset: 700; }
        75% { stroke-dashoffset: 120; }
        100% { stroke-dashoffset: 0; }
      }

      @keyframes drawAccent {
        0% { stroke-dashoffset: 240; }
        80% { stroke-dashoffset: 40; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Main flowing monogram curve -->
  <path
    class="stroke draw-main"
    d="M186 334
       C203 300, 222 267, 245 225
       C258 201, 271 181, 288 155
       C301 136, 317 136, 329 155
       C355 197, 382 243, 410 291
       M187 334
       C218 336, 241 336, 262 335
       C278 334, 291 324, 299 308
       C305 295, 316 288, 334 288"
  />

  <!-- Inner heraldic counterform -->
  <path
    class="stroke draw-inner"
    d="M287 248
       C297 226, 308 205, 319 183
       C329 202, 340 221, 348 240
       C354 254, 347 266, 329 267
       C314 267, 299 266, 282 266"
  />

  <!-- Sharp accent stroke with inward arrow -->
  <path
    class="stroke draw-accent"
    d="M353 279
       L374 317
       M374 317
       L362 309
       M374 317
       L371 302"
  />
</svg>
